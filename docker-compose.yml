# Docker-first deployment.
#   docker compose up -d --build        # start
#   docker compose logs -f              # watch (first run downloads ~GBs of weights)
#   docker compose down                 # stop
#
# Port: defaults to 7700 (inside the user's allocated range 7700-7799 on the shared
# server). Change it by exporting APP_PORT before `up`, e.g. APP_PORT=7705.
# Keep it within 7700-7799 to avoid collisions with other users.
#
# GPU requires the NVIDIA Container Toolkit on the host (nvidia-ctk). If the
# `deploy.devices` block doesn't pick up the GPU on your Docker version, see the
# `runtime: nvidia` alternative noted in the README.

services:
  bench:
    build:
      context: .
      args:
        # flash-attn is OFF by default (fast, portable build; eager is fine for invoices).
        # Enable only for LONG docs, and MATCH the arch: 4090=8.9, 5090=12.0+PTX.
        #   INSTALL_FLASH_ATTN=1 CUDA_ARCH=8.9 docker compose build
        INSTALL_FLASH_ATTN: "${INSTALL_FLASH_ATTN:-0}"
        CUDA_ARCH: "${CUDA_ARCH:-8.9;12.0+PTX}"
    image: unlimited-ocr-bench
    container_name: unlimited-ocr-bench
    ports:
      - "${APP_PORT:-7700}:${APP_PORT:-7700}"
    environment:
      APP_PORT: "${APP_PORT:-7700}"
      HF_HOME: /hf-cache
      # Reduce CUDA fragmentation on a shared GPU.
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      # Cap pages per request to bound memory while testing (0 = all pages).
      UOCR_MAX_PAGES: "${UOCR_MAX_PAGES:-0}"
      # Attention impl. Empty = model default (eager) -- correct for the default image,
      # which is built WITHOUT flash-attn. Set to flash_attention_2 ONLY if you rebuilt
      # with --build-arg INSTALL_FLASH_ATTN=1 (else it loudly falls back to eager anyway).
      UOCR_ATTN: "${UOCR_ATTN:-}"
      # Optional: run marker in-process via subprocess (will share the GPU VRAM):
      # MARKER_CMD: "marker_single {input} --output_dir {output}"
    volumes:
      - ./data:/app/data          # outputs + uploads visible on the host
      - hf-cache:/hf-cache        # persist model weights across restarts
    shm_size: "2gb"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf-cache:
